<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#020617" />
    <title>Quantum Authentication Vault (QAV)</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              orbitron: ['Orbitron', 'sans-serif'],
              rajdhani: ['Rajdhani', 'sans-serif'],
            },
            colors: {
              cyan: { 450: '#00e5ff', 950: '#083344' },
              purple: { 450: '#d946ef', 950: '#4a044e' },
              deep: '#020617',
            },
            animation: {
              'spin-slow': 'spin 12s linear infinite',
              'rotate-border': 'rotateBorder 2s linear infinite',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'in-zoom': 'inZoom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'in-fade': 'fadeIn 0.4s ease-out forwards',
              'float': 'float 6s ease-in-out infinite',
              'shimmer': 'shimmer 2.5s linear infinite',
              'glitch': 'glitch 0.2s ease-in-out infinite',
            },
            keyframes: {
              rotateBorder: {
                '0%': { transform: 'translate(-50%, -50%) rotate(0deg)' },
                '100%': { transform: 'translate(-50%, -50%) rotate(360deg)' },
              },
              inZoom: {
                '0%': { opacity: '0', transform: 'scale(0.9) translateY(30px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              },
              glitch: {
                '0%': { transform: 'translate(0)' },
                '20%': { transform: 'translate(-2px, 2px)' },
                '40%': { transform: 'translate(-2px, -2px)' },
                '60%': { transform: 'translate(2px, 2px)' },
                '80%': { transform: 'translate(2px, -2px)' },
                '100%': { transform: 'translate(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #020617;
        color: #e2e8f0;
        font-family: 'Rajdhani', sans-serif;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none;
      }
      
      /* --- CUSTOM SCROLLBAR --- */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: rgba(2, 6, 23, 0.9); }
      ::-webkit-scrollbar-thumb { 
        background: linear-gradient(to bottom, #7e22ce, #d946ef); 
        border-radius: 10px; 
      }
      ::-webkit-scrollbar-thumb:hover { background: #d946ef; }

      /* --- NEON CARD ENGINE --- */
      .neon-card-wrapper {
        position: relative;
        background: transparent;
        border-radius: 1.25rem;
        z-index: 1;
        overflow: hidden;
        padding: 2px; /* Border thickness */
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        transform: translateZ(0);
      }

      /* The Electric Spark Gradient - High Energy */
      .neon-card-wrapper::before {
        content: "";
        position: absolute;
        top: 50%; left: 50%;
        width: 300%; height: 300%; 
        transform: translate(-50%, -50%);
        z-index: -1;
        background: conic-gradient(
          from 0deg, 
          transparent 0%, 
          transparent 60%, 
          #d946ef 70%, 
          #ffffff 75%, 
          #22d3ee 80%,
          transparent 90%
        );
        animation: rotateBorder 3s linear infinite;
        opacity: 0.2;
        transition: opacity 0.5s ease;
      }
      
      .neon-card-wrapper:hover::before {
        opacity: 0.9;
        animation-duration: 1s;
      }

      /* Inner Background Layer */
      .neon-card-inner {
        position: relative;
        background: var(--card-bg, #020617);
        border-radius: 1.15rem;
        z-index: 1;
        height: 100%;
        width: 100%;
        backdrop-filter: blur(20px);
        overflow: hidden;
      }

      /* --- VARIANTS --- */
      .variant-cyan { --card-bg: rgba(8, 51, 68, 0.8); }
      .variant-purple { --card-bg: rgba(45, 10, 80, 0.4); }
      .variant-glass { --card-bg: rgba(2, 6, 23, 0.7); }

      /* --- TOUCH RIPPLE --- */
      @keyframes ripple {
        0% { transform: scale(0); opacity: 0.6; }
        100% { transform: scale(6); opacity: 0; }
      }
      .touch-ripple { position: relative; overflow: hidden; }
      .touch-ripple:active::after {
        content: "";
        position: absolute;
        width: 100px; height: 100px;
        background: rgba(217, 70, 239, 0.5);
        border-radius: 50%;
        top: 50%; left: 50%;
        margin-top: -50px; margin-left: -50px;
        animation: ripple 0.8s cubic-bezier(0, 0, 0.2, 1);
        pointer-events: none;
      }

      .gpu { transform: translate3d(0, 0, 0); backface-visibility: hidden; perspective: 1000px; }
      
      .auth-bg {
        background: 
          radial-gradient(circle at 10% 20%, rgba(126, 34, 206, 0.2) 0%, transparent 40%),
          radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 40%),
          #020617;
      }

      .glow-text {
        text-shadow: 0 0 10px rgba(217, 70, 239, 0.5), 0 0 20px rgba(217, 70, 239, 0.3);
      }
    </style>
  <script type="importmap">
{
  "imports": {

}
</script>
